name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64, ARM64]
        include:
          - platform: x86
            rid: win-x86
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v') + '.0'
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Update Package.appxmanifest version
        shell: pwsh
        run: |
          $manifest = "src\UnifiProtectClient\Package.appxmanifest"
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content $manifest -Raw) -replace 'Version="\d+\.\d+\.\d+\.\d+"', "Version=`"$version`"" |
            Set-Content $manifest -NoNewline

      - name: Setup .NET environment
        uses: ./.github/actions/setup-dotnet-env

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and Package MSIX
        shell: pwsh
        run: |
          dotnet publish src\UnifiProtectClient\UnifiProtectClient.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            -p:Platform=${{ matrix.platform }} `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageDir="${{ github.workspace }}\AppxPackages\" `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxBundle=Never

      - name: Decode certificate
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.CERTIFICATE_BASE64 }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $bytes)

      - name: Sign MSIX
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path "${{ github.workspace }}\AppxPackages" -Filter "*.msix" -Recurse |
            Select-Object -First 1
          if (-not $package) { throw "No .msix found in AppxPackages." }

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found." }

          & $signtool.FullName sign /fd SHA256 /f "${{ github.workspace }}\cert.pfx" `
            /p "${{ secrets.CERTIFICATE_PASSWORD }}" $package.FullName

      - name: Rename MSIX with platform suffix
        id: rename
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path "${{ github.workspace }}\AppxPackages" -Filter "*.msix" -Recurse |
            Select-Object -First 1
          $newName = $package.DirectoryName + "\" + $package.BaseName + "_${{ matrix.platform }}.msix"
          Rename-Item -Path $package.FullName -NewName $newName
          "MSIX_PATH=$newName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: AppxPackages/**/*.msix